<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot AI - Momin Joiya</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-card { width: 100%; max-width: 500px; height: 85vh; background: #1a202c; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid #2d3748; position: relative; }
        
        /* Header section */
        #header-container { background: #2d3748; padding: 15px; text-align: center; border-bottom: 2px solid #1a202c; position: relative; }
        #logo { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 1.5rem; color: #f6e05e; }
        #header-title { font-size: 1.4rem; font-weight: bold; color: #63b3ed; margin: 0; }
        #made-by { font-size: 0.8rem; color: #a0aec0; margin-top: 4px; font-style: italic; letter-spacing: 1px; }

        /* 2. TOP BANNER AD STYLE */
        #ad-slot-top { background: #111827; padding: 10px; text-align: center; border-bottom: 1px solid #2d3748; }
        .ad-placeholder { color: #4a5568; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #111827; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #3182ce; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #2d3748; color: #edf2f7; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        
        /* IN-CHAT AD STYLE */
        .chat-ad { align-self: center; background: #1a202c; border: 1px dashed #4a5568; padding: 10px; border-radius: 10px; width: 90%; text-align: center; color: #718096; font-size: 12px; margin: 10px 0; }

        #input-container { padding: 15px; background: #1a202c; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #4a5568; background: #0b0e14; color: white; outline: none; }
        button { background: #63b3ed; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; color: #0b0e14; font-weight: bold; transition: 0.2s; }
        button:hover { background: #4299e1; }
    </style>
</head>
<body>

<div id="chat-card">
    <div id="header-container">
        <div id="logo">⚡</div>
        <div id="header-title">Chatbot AI</div>
        <div id="made-by">made by momin joiya</div>
    </div>

    <div id="ad-slot-top">
        <span class="ad-placeholder">Advertisement</span>
        <div style="width:100%; height:50px; background:#2d3748; display:flex; align-items:center; justify-content:center; border-radius:8px;">
            Banner Ad (320x50)
        </div>
    </div>
    
    <div id="chat-box">
        <div class="msg bot">HELLO!!</div>
    </div>
    
    <div id="input-container">
        <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    const GROQ_API_KEY = "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"; 
    
    let chatHistory = [];
    let messageCount = 0; // Count messages to show In-Chat Ads

    const chatBox = document.getElementById("chat-box");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    async function handleChat() {
        const message = userInput.value.trim();
        if (!message) return;

        addMessage(message, 'user');
        userInput.value = "";
        chatHistory.push({ role: "user", content: message });

        const loadingDiv = addMessage("Thinking...", 'bot');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile", 
                    messages: chatHistory
                })
            });

            const data = await response.json();
            
            if (data.choices && data.choices[0].message) {
                const botReply = data.choices[0].message.content;
                loadingDiv.innerText = botReply;
                chatHistory.push({ role: "assistant", content: botReply });
            } else {
                loadingDiv.innerText = "Error: Check API Key or Limit.";
            }
        } catch (error) {
            loadingDiv.innerText = "Connection failed.";
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement("div");
        div.className = `msg ${sender}`;
        div.innerText = text;
        chatBox.appendChild(div);
        
        messageCount++;

        // 3. IN-CHAT AD LOGIC (Har 4 messages ke baad ad)
        if (messageCount % 4 === 0) {
            const adDiv = document.createElement("div");
            adDiv.className = "chat-ad";
            adDiv.innerHTML = `<span class="ad-placeholder">Sponsored</span>
                               <div style="height:60px; display:flex; align-items:center; justify-content:center;">In-Feed Ad Code Here</div>`;
            chatBox.appendChild(adDiv);
        }

        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    sendBtn.addEventListener("click", handleChat);
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });
</script>

</body>
</html>
